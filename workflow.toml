# galoop workflow.toml
#
# row workflow definition.  Run with:
#   row run
# from the run directory (where galoop.yaml lives and workspace/ will be created).
#
# The `relax` operation picks up every pending job and runs the calculator
# pipeline.  On completion the job doc status is set to relaxed/failed/desorbed
# by the _relax command.
#
# The main GA loop (galoop run) handles evaluation (duplicate detection, GCE)
# and offspring spawning by polling job docs directly.  This keeps the
# in-memory struct_cache coherent without requiring inter-process coordination.

[workspace]
path = "workspace"

# ---------------------------------------------------------------------------
# relax — run the calculator pipeline on each pending structure
# ---------------------------------------------------------------------------

[[group]]
name = "relax"

[group.include.condition]
"doc.status" = "pending"

[group.action]
# {id} is the job's statepoint "id" field; {root} is the project root directory
command = "galoop _relax {id} --run-dir {root}"

# Scheduler resources — adjust for your cluster
# [group.action.resources]
# walltime = "02:00:00"
# processes = { per_submission = 1, cores_per_process = 4 }
